<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Members</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premium: {
                            900: '#002726',
                            800: '#032E2E',
                            600: '#0A5C5C',
                            50: '#F0F5F5'
                        }
                    },
                    fontFamily: {
                        sans: ['"IBM Plex Sans"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'IBM Plex Sans', sans-serif; background-color: #FAFAFA; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col pb-24">

    <header class="bg-premium-900 text-white shadow-md p-4 flex items-center sticky top-0 z-20">
        <button id="back-btn" onclick="navigateBack()" class="mr-4 hidden"><i class="material-icons">arrow_back</i></button>
        <h1 class="text-xl font-semibold flex-1" id="header-title">Manage Members</h1>
    </header>

    <main class="max-w-3xl mx-auto w-full p-4 relative" id="main-content">
        
        <div id="loading-state" class="flex justify-center mt-12">
            <div class="animate-spin rounded-2xl h-8 w-8 border-b-2 border-premium-800"></div>
        </div>

        <div id="view-list" class="hidden fade-in space-y-3">
            <div id="empty-state" class="hidden text-center text-gray-500 mt-12 italic">
                No members found. Tap '+' to create one.
            </div>
            <div id="members-container" class="space-y-0"></div>
        </div>

        <div id="view-form" class="hidden fade-in space-y-8 mt-4">
            
            <input type="text" id="f-name" placeholder="Full Name" class="w-full border border-gray-300 p-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-premium-600 transition-shadow">

            <div>
                <h3 class="text-lg font-bold text-premium-900 mb-4 border-b pb-2">Spiritual Details</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Gender</label>
                        <select id="f-gender" onchange="toggleGenderFields()" class="w-full border border-gray-300 p-3 rounded-2xl bg-white mt-1">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div id="container-privilege">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Privilege</label>
                        <select id="f-privilege" class="w-full border border-gray-300 p-3 rounded-2xl bg-white mt-1">
                            <option value="None">None</option>
                            <option value="Ministerial Servant">Ministerial Servant</option>
                            <option value="Elder">Elder</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Baptism Status</label>
                        <select id="f-baptism-status" onchange="toggleBaptismFields()" class="w-full border border-gray-300 p-3 rounded-2xl bg-white mt-1">
                            <option value="Enrolled in School">Enrolled in School</option>
                            <option value="Unbaptized Publisher">Unbaptized Publisher</option>
                            <option value="Baptized">Baptized</option>
                        </select>
                    </div>

                    <div id="container-baptism-date" class="hidden">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Baptism Date</label>
                        <input type="date" id="f-baptism-date" class="w-full border border-gray-300 p-3 rounded-2xl bg-white mt-1">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Pioneering</label>
                        <select id="f-pioneer" class="w-full border border-gray-300 p-3 rounded-2xl bg-white mt-1">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-premium-900 mb-4 border-b pb-2">Contact Information</h3>
                <div class="space-y-4">
                    <input type="text" id="f-mobile" placeholder="Mobile Number" class="w-full border border-gray-300 p-3 rounded-2xl">
                    <input type="text" id="f-ec-name" placeholder="Emergency Contact Name" class="w-full border border-gray-300 p-3 rounded-2xl">
                    <input type="text" id="f-ec-num" placeholder="Emergency Contact Number" class="w-full border border-gray-300 p-3 rounded-2xl">
                    
                    <button id="btn-toggle-extra-contacts" onclick="toggleExtraContacts()" class="text-premium-600 font-medium text-sm flex items-center hover:text-premium-800 transition-colors">
                        <i class="material-icons text-[18px] mr-1">add_circle_outline</i> Add more contacts
                    </button>

                    <div id="container-extra-contacts" class="hidden space-y-4 pt-2 border-t border-gray-100">
                        <input type="text" id="f-pnum2" placeholder="Personal Number 2" class="w-full border border-gray-300 p-3 rounded-2xl bg-gray-50">
                        <input type="text" id="f-ec2-name" placeholder="Emergency Contact 2 Name" class="w-full border border-gray-300 p-3 rounded-2xl bg-gray-50">
                        <input type="text" id="f-ec2-num" placeholder="Emergency Contact 2 Number" class="w-full border border-gray-300 p-3 rounded-2xl bg-gray-50">
                    </div>

                    <textarea id="f-address" placeholder="Address" rows="3" class="w-full border border-gray-300 p-3 rounded-2xl"></textarea>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-premium-900 mb-4 border-b pb-2">System Access</h3>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wide ml-1">Link to Google Account</label>
                <div class="flex items-center space-x-2 mt-1">
                    <select id="f-linked-user" class="flex-1 border border-gray-300 p-3 rounded-2xl bg-white">
                        <option value="">None</option>
                        </select>
                </div>
                <p class="text-[11px] text-gray-500 mt-2 px-1">Linking an account allows the user to log in and view personalized congregation data.</p>
            </div>

            <div class="pt-6 space-y-4">
                <button id="btn-save" onclick="saveMember()" class="w-full bg-premium-800 text-white py-4 rounded-2xl font-bold hover:bg-premium-900 transition-colors shadow-md text-lg">
                    Save Member Profile
                </button>

                <button id="btn-unlink" onclick="unlinkAccount()" class="w-full border-2 border-red-500 text-red-500 py-3 rounded-2xl font-bold hover:bg-red-50 transition-colors flex items-center justify-center hidden">
                    <i class="material-icons mr-2">link_off</i> Unlink Google Account
                </button>

                <button id="btn-delete" onclick="deleteMember()" class="w-full text-red-500 py-3 rounded-2xl font-bold hover:bg-red-50 transition-colors flex items-center justify-center hidden mt-8">
                    <i class="material-icons mr-2">delete</i> Delete Member
                </button>
            </div>

        </div>
    </main>

    <button id="fab-add" onclick="openForm()" class="fixed bottom-6 right-6 bg-premium-800 text-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center hover:bg-premium-900 transition-colors hidden z-10">
        <i class="material-icons">add</i>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq-NkomNItBZorK7GQqvcFwSvFB5oHMaA",
            authDomain: "schedy-congegation.firebaseapp.com",
            projectId: "schedy-congegation",
            storageBucket: "schedy-congegation.firebasestorage.app",
            messagingSenderId: "642904120818",
            appId: "1:642904120818:web:6a1cd7c2cd0dc460d41f6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let membersList = [];
        let availableUsers = [];
        
        let currentView = "LIST";
        let editId = null;
        let originalLinkedUserId = null;
        let showExtraContacts = false;

        async function init() {
            try {
                await loadMembers();
                await loadUsers();
                
                // If there's a pending user parameter from another page, you would parse it here 
                // using URLSearchParams and trigger openForm() with preset data.
                
                document.getElementById('loading-state').classList.add('hidden');
                renderList();
            } catch (e) {
                alert("Error initializing: " + e.message);
            }
        }

        async function loadMembers() {
            const snap = await getDocs(collection(db, "members"));
            membersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            membersList.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
        }

        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            availableUsers = snap.docs.map(d => ({
                id: d.id,
                name: d.data().name || "No Name",
                email: d.data().email || ""
            }));
            
            const userSelect = document.getElementById('f-linked-user');
            userSelect.innerHTML = '<option value="">None</option>';
            availableUsers.forEach(u => {
                userSelect.innerHTML += `<option value="${u.id}">${u.name} (${u.email})</option>`;
            });
        }

        window.renderList = () => {
            currentView = "LIST";
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('header-title').innerText = "Manage Members";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('fab-add').classList.remove('hidden');

            const container = document.getElementById('members-container');
            const emptyState = document.getElementById('empty-state');
            
            container.innerHTML = "";
            
            if (membersList.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                membersList.forEach(m => {
                    const pioneer = m.pioneerStatus === "Yes" ? "Pioneer" : null;
                    const priv = (m.privilege && m.privilege !== "None") ? m.privilege : null;
                    let subtitles = [priv, pioneer].filter(Boolean);
                    const subtitleText = subtitles.length > 0 ? subtitles.join(" • ") : "Publisher";
                    
                    const linkedIcon = m.linkedUserId ? `<i class="material-icons text-premium-600 text-lg">person</i>` : '';

                    container.innerHTML += `
                        <div onclick="openForm('${m.id}')" class="flex items-center justify-between p-4 bg-white border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                            <div>
                                <h3 class="font-bold text-gray-900 text-[15px]">${m.name || "Unnamed"}</h3>
                                <p class="text-sm text-gray-500">${subtitleText}</p>
                            </div>
                            <div>${linkedIcon}</div>
                        </div>
                    `;
                });
            }
        };

        window.openForm = (id = null) => {
            currentView = "FORM";
            editId = id;
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            document.getElementById('header-title').innerText = id ? "Edit Member" : "New Member";
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('fab-add').classList.add('hidden');

            // Reset UI States
            showExtraContacts = false;
            document.getElementById('container-extra-contacts').classList.add('hidden');
            document.getElementById('btn-toggle-extra-contacts').innerHTML = `<i class="material-icons text-[18px] mr-1">add_circle_outline</i> Add more contacts`;

            if (id) {
                const member = membersList.find(m => m.id === id);
                originalLinkedUserId = member.linkedUserId || null;
                
                setV('f-name', member.name);
                setV('f-gender', member.gender || 'Male');
                setV('f-baptism-status', member.baptismStatus || 'Enrolled in School');
                setV('f-baptism-date', member.baptismDate);
                setV('f-pioneer', member.pioneerStatus || 'No');
                setV('f-privilege', member.privilege || 'None');
                setV('f-mobile', member.mobileNumber);
                setV('f-ec-name', member.emergencyContactName);
                setV('f-ec-num', member.emergencyContactNumber);
                setV('f-pnum2', member.personalNumber2);
                setV('f-ec2-name', member.emergencyContact2Name);
                setV('f-ec2-num', member.emergencyContact2Number);
                setV('f-address', member.address);
                setV('f-linked-user', member.linkedUserId || '');

                if (member.personalNumber2 || member.emergencyContact2Name || member.emergencyContact2Number) {
                    toggleExtraContacts();
                }

                document.getElementById('btn-unlink').classList.toggle('hidden', !member.linkedUserId);
                document.getElementById('btn-delete').classList.remove('hidden');
            } else {
                originalLinkedUserId = null;
                setV('f-name', ''); setV('f-gender', 'Male'); setV('f-baptism-status', 'Enrolled in School');
                setV('f-baptism-date', ''); setV('f-pioneer', 'No'); setV('f-privilege', 'None');
                setV('f-mobile', ''); setV('f-ec-name', ''); setV('f-ec-num', '');
                setV('f-pnum2', ''); setV('f-ec2-name', ''); setV('f-ec2-num', '');
                setV('f-address', ''); setV('f-linked-user', '');

                document.getElementById('btn-unlink').classList.add('hidden');
                document.getElementById('btn-delete').classList.add('hidden');
            }

            toggleGenderFields();
            toggleBaptismFields();
            window.scrollTo(0, 0);
        };

        window.navigateBack = () => renderList();

        // --- Dynamic Form Toggles ---
        window.toggleGenderFields = () => {
            const gender = getV('f-gender');
            document.getElementById('container-privilege').classList.toggle('hidden', gender !== 'Male');
            if (gender !== 'Male') setV('f-privilege', 'None');
        };

        window.toggleBaptismFields = () => {
            const status = getV('f-baptism-status');
            document.getElementById('container-baptism-date').classList.toggle('hidden', status !== 'Baptized');
            if (status !== 'Baptized') setV('f-baptism-date', '');
        };

        window.toggleExtraContacts = () => {
            showExtraContacts = !showExtraContacts;
            const container = document.getElementById('container-extra-contacts');
            const btn = document.getElementById('btn-toggle-extra-contacts');
            
            if (showExtraContacts) {
                container.classList.remove('hidden');
                btn.innerHTML = `<i class="material-icons text-[18px] mr-1">remove_circle_outline</i> Hide extra contacts`;
            } else {
                container.classList.add('hidden');
                btn.innerHTML = `<i class="material-icons text-[18px] mr-1">add_circle_outline</i> Add more contacts`;
                setV('f-pnum2', ''); setV('f-ec2-name', ''); setV('f-ec2-num', '');
            }
        };

        // --- Save, Delete, Unlink Logic ---
        window.saveMember = async () => {
            const name = getV('f-name').trim();
            if (!name) return alert("Please enter a name.");

            const btn = document.getElementById('btn-save');
            btn.innerText = "Saving..."; btn.disabled = true;

            try {
                const linkedUserId = getV('f-linked-user') || null;
                const gender = getV('f-gender');
                const baptismStatus = getV('f-baptism-status');

                const data = {
                    name, gender, baptismStatus,
                    baptismDate: baptismStatus === "Baptized" ? getV('f-baptism-date') : "",
                    pioneerStatus: getV('f-pioneer'),
                    privilege: gender === "Male" ? getV('f-privilege') : "None",
                    linkedUserId,
                    mobileNumber: getV('f-mobile'),
                    emergencyContactName: getV('f-ec-name'),
                    emergencyContactNumber: getV('f-ec-num'),
                    personalNumber2: getV('f-pnum2'),
                    emergencyContact2Name: getV('f-ec2-name'),
                    emergencyContact2Number: getV('f-ec2-num'),
                    address: getV('f-address')
                };

                if (!editId) {
                    // NEW MEMBER
                    let memberId;
                    if (linkedUserId) {
                        const mainDoc = await getDoc(doc(db, "members", linkedUserId));
                        if (!mainDoc.exists()) {
                            memberId = linkedUserId; // First member for this user gets user's UID
                        } else {
                            memberId = doc(collection(db, "members")).id; // Family member gets random ID
                        }
                    } else {
                        memberId = doc(collection(db, "members")).id;
                    }

                    await setDoc(doc(db, "members", memberId), data);

                    if (linkedUserId) {
                        const userRef = doc(db, "users", linkedUserId);
                        await updateDoc(userRef, { status: "approved" });
                        
                        if (memberId === linkedUserId) {
                            const uDoc = await getDoc(userRef);
                            const currentIds = uDoc.data().linkedMemberIds || [];
                            const newArray = [memberId, ...currentIds.filter(id => id !== memberId)];
                            await updateDoc(userRef, { linkedMemberIds: newArray });
                        } else {
                            await updateDoc(userRef, { linkedMemberIds: arrayUnion(memberId) });
                        }
                    }
                } else {
                    // EDIT EXISTING
                    await updateDoc(doc(db, "members", editId), data);

                    if (linkedUserId !== originalLinkedUserId) {
                        if (originalLinkedUserId) {
                            await updateDoc(doc(db, "users", originalLinkedUserId), { linkedMemberIds: arrayRemove(editId) });
                        }
                        if (linkedUserId) {
                            await updateDoc(doc(db, "users", linkedUserId), { status: "approved", linkedMemberIds: arrayUnion(editId) });
                        }
                    }
                }

                await loadMembers();
                renderList();
            } catch (e) {
                alert("Error saving: " + e.message);
            } finally {
                btn.innerText = "Save Member Profile"; btn.disabled = false;
            }
        };

        window.unlinkAccount = async () => {
            if (!editId || !originalLinkedUserId) return;
            try {
                await updateDoc(doc(db, "members", editId), { linkedUserId: null });
                await updateDoc(doc(db, "users", originalLinkedUserId), { linkedMemberIds: arrayRemove(editId) });
                
                originalLinkedUserId = null;
                setV('f-linked-user', '');
                document.getElementById('btn-unlink').classList.add('hidden');
                
                await loadMembers();
                alert("Account unlinked successfully.");
            } catch (e) {
                alert("Error unlinking account.");
            }
        };

        window.deleteMember = async () => {
            if (!editId || !confirm("Are you sure you want to delete this member? This action cannot be undone.")) return;
            
            try {
                await deleteDoc(doc(db, "members", editId));
                if (originalLinkedUserId) {
                    await updateDoc(doc(db, "users", originalLinkedUserId), { linkedMemberIds: arrayRemove(editId) });
                }
                
                await loadMembers();
                renderList();
            } catch (e) {
                alert("Error deleting member.");
            }
        };

        // Helpers
        const setV = (id, val) => document.getElementById(id).value = val || '';
        const getV = (id) => document.getElementById(id).value;

        // Start
        init();
    </script>
</body>
</html>
