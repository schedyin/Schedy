<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedy — App Update Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --muted: #888896;
    --accent: #22c55e;
    --accent-bg: rgba(34,197,94,0.10);
    --accent-border: rgba(34,197,94,0.28);
    --danger: #ef4444;
    --danger-bg: rgba(239,68,68,0.10);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.10);
    --amber-border: rgba(245,158,11,0.28);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 80px;
  }

  .shell {
    width: 100%;
    max-width: 560px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-row h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-row p  { font-size: 13px; color: var(--muted); margin-top: 1px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 500;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-sm);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon { font-size: 28px; margin-bottom: 10px; }
  .drop-label { font-size: 14px; font-weight: 600; color: var(--text); }
  .drop-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .file-selected {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-top: 12px;
  }

  .file-selected.show { display: flex; }
  .file-icon { font-size: 22px; }
  .file-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 12px; color: var(--muted); }
  .file-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; }
  .file-remove:hover { color: var(--danger); }

  .progress-wrap {
    display: none;
    margin-top: 16px;
  }
  .progress-wrap.show { display: block; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.2s;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: var(--accent);
    color: #001a0a;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .toast {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
  }
  .toast.show { display: flex; }
  .toast.success { background: var(--accent-bg); border: 1px solid var(--accent-border); color: var(--accent); }
  .toast.error   { background: var(--danger-bg); border: 1px solid rgba(239,68,68,0.28); color: var(--danger); }
  .toast.info    { background: var(--amber-bg);  border: 1px solid var(--amber-border);  color: var(--amber); }

  .current-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 20px;
  }
  .current-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px; }
  .current-row   { display: flex; justify-content: space-between; align-items: center; }
  .current-ver   { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .current-status { font-size: 12px; color: var(--muted); }
  .no-data { color: var(--muted); font-size: 14px; font-style: italic; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,26,10,0.3);
    border-top-color: #001a0a;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="shell">

  <div class="logo-row">
    <div class="logo-icon">📱</div>
    <div>
      <h1>Schedy Admin</h1>
      <p>App update manager</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Current version in Firebase</div>
    <div class="current-card" id="currentBlock">
      <div class="current-label">Live version</div>
      <div class="current-row">
        <span class="current-ver" id="currentVer">Loading…</span>
        <span class="current-status" id="currentStatus"></span>
      </div>
    </div>

    <div class="field">
      <label for="versionInput">New version name</label>
      <input type="text" id="versionInput" placeholder="e.g. 1.1" autocomplete="off" spellcheck="false" />
      <p class="hint">Must match the <code>versionName</code> in your app's build.gradle.kts exactly.</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">APK file</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="apkFile" accept=".apk" />
      <div class="drop-icon">📦</div>
      <div class="drop-label">Drop APK here or click to browse</div>
      <div class="drop-sub">Only .apk files · max 500 MB</div>
    </div>

    <div class="file-selected" id="fileSelected">
      <span class="file-icon">📦</span>
      <span class="file-name" id="fileName"></span>
      <span class="file-size" id="fileSize"></span>
      <button class="file-remove" id="removeFile" title="Remove">✕</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">Uploading…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="publishBtn" disabled>Publish update</button>

  <div class="toast" id="toast"></div>

</div>

<script type="module">
  import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDq-NkomNItBZorK7GQqvcFwSvFB5oHMaA",
    authDomain:        "schedy-congegation.firebaseapp.com",
    projectId:         "schedy-congegation",
    storageBucket:     "schedy-congegation.firebasestorage.app",
    messagingSenderId: "642904120818",
    appId:             "1:642904120818:web:6a1cd7c2cd0dc460d41f6b",
    measurementId:     "G-9S01FNLFZ3"
  };

  const app     = initializeApp(firebaseConfig);
  const db      = getFirestore(app);
  const storage = getStorage(app);

  const versionInput = document.getElementById("versionInput");
  const apkFileInput = document.getElementById("apkFile");
  const dropZone     = document.getElementById("dropZone");
  const fileSelected = document.getElementById("fileSelected");
  const fileName     = document.getElementById("fileName");
  const fileSize     = document.getElementById("fileSize");
  const removeFile   = document.getElementById("removeFile");
  const progressWrap = document.getElementById("progressWrap");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const progressPct  = document.getElementById("progressPct");
  const publishBtn   = document.getElementById("publishBtn");
  const toast        = document.getElementById("toast");
  const currentVer   = document.getElementById("currentVer");
  const currentStatus= document.getElementById("currentStatus");

  let selectedFile = null;

  function fmt(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function showToast(msg, type = "info") {
    toast.textContent = msg;
    toast.className   = "toast show " + type;
    if (type === "success") setTimeout(() => toast.className = "toast", 5000);
  }

  function checkPublishReady() {
    publishBtn.disabled = !(versionInput.value.trim() && selectedFile);
  }

  function setFile(file) {
    if (!file || !file.name.endsWith(".apk")) {
      showToast("Please select a valid .apk file.", "error");
      return;
    }
    if (file.size > 500 * 1024 * 1024) {
      showToast("File is too large. Max 500 MB.", "error");
      return;
    }
    selectedFile       = file;
    fileName.textContent = file.name;
    fileSize.textContent = fmt(file.size);
    fileSelected.classList.add("show");
    checkPublishReady();
  }

  apkFileInput.addEventListener("change", () => {
    if (apkFileInput.files[0]) setFile(apkFileInput.files[0]);
  });

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    setFile(e.dataTransfer.files[0]);
  });

  removeFile.addEventListener("click", () => {
    selectedFile = null;
    apkFileInput.value = "";
    fileSelected.classList.remove("show");
    progressWrap.classList.remove("show");
    checkPublishReady();
  });

  versionInput.addEventListener("input", checkPublishReady);

  async function loadCurrentVersion() {
    try {
      const snap = await getDoc(doc(db, "metadata", "releases_index"));
      if (snap.exists()) {
        const d = snap.data();
        currentVer.textContent    = d.latestVersion ? "v" + d.latestVersion : "Not set yet";
        currentStatus.textContent = d.apkUrl ? "APK uploaded ✓" : "No APK yet";
      } else {
        currentVer.textContent    = "Not set";
        currentStatus.textContent = "First publish";
      }
    } catch (e) {
      currentVer.textContent = "Error loading";
    }
  }

  loadCurrentVersion();

  publishBtn.addEventListener("click", async () => {
    const version = versionInput.value.trim();
    if (!version || !selectedFile) return;

    publishBtn.disabled   = true;
    publishBtn.innerHTML  = '<span class="spinner"></span>Uploading APK…';
    progressWrap.classList.add("show");
    progressFill.style.width = "0%";
    progressText.textContent = "Uploading to Firebase Storage…";
    progressPct.textContent  = "0%";

    try {
      const storageRef    = ref(storage, `apk/schedy-latest.apk`);
      const uploadTask    = uploadBytesResumable(storageRef, selectedFile);

      const apkUrl = await new Promise((resolve, reject) => {
        uploadTask.on(
          "state_changed",
          snap => {
            const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
            progressFill.style.width = pct + "%";
            progressPct.textContent  = pct + "%";
            progressText.textContent = pct < 100 ? "Uploading to Firebase Storage…" : "Finalising…";
          },
          reject,
          async () => resolve(await getDownloadURL(uploadTask.snapshot.ref))
        );
      });

      publishBtn.innerHTML = '<span class="spinner"></span>Saving to Firestore…';

      await setDoc(doc(db, "metadata", "releases_index"), {
        latestVersion: version,
        apkUrl:        apkUrl,
        updatedAt:     Date.now()
      }, { merge: true });

      progressText.textContent = "Done!";
      progressFill.style.width = "100%";
      showToast(`✓ Version ${version} published successfully!`, "success");

      currentVer.textContent    = "v" + version;
      currentStatus.textContent = "APK uploaded";

      versionInput.value = "";
      selectedFile       = null;
      apkFileInput.value = "";
      fileSelected.classList.remove("show");
      setTimeout(() => progressWrap.classList.remove("show"), 2000);

    } catch (err) {
      console.error(err);
      showToast("Upload failed: " + err.message, "error");
      progressWrap.classList.remove("show");
    } finally {
      publishBtn.innerHTML = "Publish update";
      checkPublishReady();
    }
  });
</script>
</body>
</html>
